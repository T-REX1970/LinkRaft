syntax = "proto3";

package raft;

option go_package = "github.com/noda/linkraft/proto/raftpb";

// Raft はノード間の合意形成 RPC。
service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

// LogEntry は複製されるログエントリ。
message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3;
  // 0 = 通常のコマンド / no-op、1 = メンバーシップ変更（command は
  // 全メンバーの id -> addr マップの JSON）
  uint32 type = 4;
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
  // pre-vote（事前投票）: term を上げる前の打診。受信側は term / votedFor /
  // 選挙タイマーを一切変更せずに、投票するかどうかだけを答える。
  bool pre_vote = 5;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  // success 時にフォロワーが複製済みの最後のインデックス
  uint64 match_index = 3;
}

// InstallSnapshot はログを持たない範囲まで遅れたフォロワーへ
// ステートマシンのスナップショットを転送する（チャンク分割なしの簡易版）。
message InstallSnapshotRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;
  // スナップショット時点のクラスタ構成（全メンバーの id -> addr マップの JSON）。
  // 空なら構成情報なし（旧形式）。
  bytes members = 6;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}
