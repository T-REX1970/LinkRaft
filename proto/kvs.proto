syntax = "proto3";

package kvs;

option go_package = "github.com/noda/linkraft/proto/kvspb";

// KVS はクライアント（API サーバー）向けのキーバリュー操作 RPC。
// 書き込み系（Set / Delete / Incr）はリーダーのみ受け付け、
// フォロワーは not_leader = true とリーダーのヒントを返す。
service KVS {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Set(SetRequest) returns (SetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Incr(IncrRequest) returns (IncrResponse);
  rpc Keys(KeysRequest) returns (KeysResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  // メンバーシップ変更（リーダーのみ受け付け。フォロワーはヒントを返す）
  rpc AddMember(AddMemberRequest) returns (MemberChangeResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (MemberChangeResponse);
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
  bool not_leader = 3;
  string leader_addr = 4;
}

message SetRequest {
  string key = 1;
  bytes value = 2;
}

message SetResponse {
  bool not_leader = 1;
  string leader_addr = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool not_leader = 1;
  string leader_addr = 2;
}

message IncrRequest {
  string key = 1;
}

message IncrResponse {
  int64 value = 1;
  bool not_leader = 2;
  string leader_addr = 3;
}

message KeysRequest {
  string prefix = 1;
}

message KeysResponse {
  repeated string keys = 1;
  bool not_leader = 2;
  string leader_addr = 3;
}

message StatusRequest {}

message StatusResponse {
  string node_id = 1;
  // "leader" | "follower" | "candidate"
  string state = 2;
  uint64 term = 3;
  string leader_id = 4;
  uint64 commit_index = 5;
  uint64 applied_index = 6;
  int64 keys_total = 7;
  // ログコンパクション済みの境界（なければ 0）
  uint64 snapshot_index = 8;
  // このノードが認識しているクラスタ構成（自分を含む）
  repeated Member members = 9;
  // ログ末尾のインデックス（複製進捗の分母に使う）
  uint64 last_log_index = 10;
}

// Member はクラスタメンバー 1 台分の情報。
message Member {
  string id = 1;
  string addr = 2;
  // リーダーが把握している複製済みインデックス（リーダー応答時のみ意味を持つ。
  // 自ノード分はログ末尾）
  uint64 match_index = 3;
}

message AddMemberRequest {
  string id = 1;
  string addr = 2;
}

message RemoveMemberRequest {
  string id = 1;
}

message MemberChangeResponse {
  bool not_leader = 1;
  string leader_addr = 2;
  // 変更を受け付けられなかった理由（変更が進行中、リーダー自身の削除など）。
  // 空なら成功。
  string error = 3;
}
